<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" width="800" height="800">
  <style>
    :root { 
      --neon-red: #ff0000; 
      --neon-glow: #ff3333; 
    }
    
    /* Neon body pulse */
    @keyframes neonPulse {
      0%, 100% { filter: drop-shadow(0 0 15px var(--neon-red)) drop-shadow(0 0 40px var(--neon-glow)); }
      50%      { filter: drop-shadow(0 0 50px var(--neon-red)) drop-shadow(0 0 80px #ff3333); }
    }
    .body { animation: neonPulse 1.8s ease-in-out infinite; }
    
    /* Leg crawl – staggered for natural movement */
    @keyframes legCrawl {
      0%, 100% { transform: rotate(-4deg); }
      50%      { transform: rotate(12deg); }
    }
    .leg { animation: legCrawl 1.1s ease-in-out infinite alternate; transform-origin: 50% 25%; }
    
    /* Web subtle vibration */
    @keyframes webVibe {
      0%, 100% { transform: scale(1) rotate(0deg); }
      50%      { transform: scale(1.015) rotate(1deg); }
    }
    .web { animation: webVibe 4s ease-in-out infinite; }
  </style>

  <!-- Solid black background -->
  <rect width="400" height="400" fill="#000000"/>

  <!-- Spider Web (background) -->
  <g class="web" opacity="0.25">
    <circle cx="200" cy="290" r="110" fill="none" stroke="#331122" stroke-width="4"/>
    <circle cx="200" cy="290" r="75" fill="none" stroke="#331122" stroke-width="3"/>
    <!-- Radial lines (simplified) -->
    <line x1="200" y1="290" x2="120" y2="220" stroke="#331122" stroke-width="2"/>
    <line x1="200" y1="290" x2="280" y2="220" stroke="#331122" stroke-width="2"/>
    <line x1="200" y1="290" x2="110" y2="320" stroke="#331122" stroke-width="2"/>
    <line x1="200" y1="290" x2="290" y2="320" stroke="#331122" stroke-width="2"/>
  </g>

  <!-- Spider Body – Hexagonal DuckDB style -->
  <g class="body">
    <!-- Outer hexagon -->
    <polygon points="155,135 200,105 245,135 245,190 200,220 155,190" 
             fill="#110011" stroke="var(--neon-red)" stroke-width="14" stroke-linejoin="round"/>
    <!-- Inner circuit ring -->
    <polygon points="165,145 200,120 235,145 235,180 200,205 165,180" 
             fill="none" stroke="var(--neon-glow)" stroke-width="6"/>
    <!-- Code symbol inside body -->
    <text x="200" y="170" font-family="'Courier New', monospace" font-size="48" 
          fill="#ff0000" font-weight="bold" text-anchor="middle" dominant-baseline="middle">&lt;/&gt;</text>
  </g>

  <!-- 8 Circuit Legs (staggered animation) -->
  <!-- Leg 1 (top-left) -->
  <g class="leg" style="animation-delay:0s">
    <path d="M155 155 Q 85 95 55 135" fill="none" stroke="var(--neon-red)" stroke-width="9" stroke-linecap="round"/>
    <circle cx="105" cy="115" r="3.5" fill="#ff3333"/>
  </g>
  <!-- Leg 2 -->
  <g class="leg" style="animation-delay:120ms">
    <path d="M245 155 Q 315 95 345 135" fill="none" stroke="var(--neon-red)" stroke-width="9" stroke-linecap="round"/>
  </g>
  <!-- Leg 3 -->
  <g class="leg" style="animation-delay:40ms">
    <path d="M150 175 Q 75 165 45 215" fill="none" stroke="var(--neon-red)" stroke-width="9" stroke-linecap="round"/>
  </g>
  <!-- Leg 4 -->
  <g class="leg" style="animation-delay:180ms">
    <path d="M250 175 Q 325 165 355 215" fill="none" stroke="var(--neon-red)" stroke-width="9" stroke-linecap="round"/>
  </g>
  <!-- Leg 5 -->
  <g class="leg" style="animation-delay:80ms">
    <path d="M155 195 Q 80 235 65 285" fill="none" stroke="var(--neon-red)" stroke-width="9" stroke-linecap="round"/>
  </g>
  <!-- Leg 6 -->
  <g class="leg" style="animation-delay:220ms">
    <path d="M245 195 Q 320 235 335 285" fill="none" stroke="var(--neon-red)" stroke-width="9" stroke-linecap="round"/>
  </g>
  <!-- Leg 7 -->
  <g class="leg" style="animation-delay:160ms">
    <path d="M165 210 Q 95 270 80 320" fill="none" stroke="var(--neon-red)" stroke-width="9" stroke-linecap="round"/>
  </g>
  <!-- Leg 8 -->
  <g class="leg" style="animation-delay:60ms">
    <path d="M235 210 Q 305 270 320 320" fill="none" stroke="var(--neon-red)" stroke-width="9" stroke-linecap="round"/>
  </g>
</svg>
